# The Builder's Bible — Bibliography
# Format: key → { author, title, type, url, date, description }

# === Books ===
kleppmann-ddia:
  author: "Martin Kleppmann"
  title: "Designing Data-Intensive Applications"
  type: book
  publisher: "O'Reilly Media"
  date: "2017"
  description: "The definitive guide to distributed systems and data architecture"

chip-huyen-ai-eng:
  author: "Chip Huyen"
  title: "AI Engineering"
  type: book
  publisher: "O'Reilly Media"
  date: "2025"
  description: "Production patterns for building AI-powered applications"

raschka-build-llm:
  author: "Sebastian Raschka"
  title: "Build a Large Language Model (From Scratch)"
  type: book
  publisher: "Manning"
  date: "2024"
  description: "Step-by-step guide to building and understanding LLMs"

osmani-vibe-coding:
  author: "Addy Osmani"
  title: "Vibe Coding: The Future of Programming"
  type: book
  publisher: "O'Reilly Media"
  date: "2025"
  description: "Comprehensive guide to AI-assisted software development"

xu-system-design:
  author: "Alex Xu"
  title: "System Design Interview"
  type: book
  publisher: "Byte Code LLC"
  date: "2022"
  description: "Practical system design patterns and interview preparation"

# === Papers & Research ===
vaswani-attention:
  author: "Vaswani et al."
  title: "Attention Is All You Need"
  type: paper
  venue: "NeurIPS 2017"
  date: "2017"
  description: "The paper that introduced the transformer architecture"

yao-react:
  author: "Shunyu Yao et al."
  title: "ReAct: Synergizing Reasoning and Acting in Language Models"
  type: paper
  venue: "ICLR 2023"
  date: "2023"
  description: "The Reason-Act pattern for AI agents"

wei-chain-of-thought:
  author: "Jason Wei et al."
