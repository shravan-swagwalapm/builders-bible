  type: paper
  venue: "NeurIPS 2022"
  date: "2022"
  description: "Showed that asking models to think step-by-step dramatically improves performance"

zaharia-compound-ai:
  author: "Matei Zaharia et al. (BAIR)"
  title: "The Shift from Models to Compound AI Systems"
  type: blog
  date: "2024"
  description: "State-of-the-art AI results increasingly come from compound systems, not monolithic models"

